version: "3.9"

services:

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ai-pool-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-pool-net

  redis:
    image: redis:7.2-alpine
    container_name: ai-pool-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ai-pool-net

  postgres:
    image: postgres:16-alpine
    container_name: ai-pool-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ai_pool
      POSTGRES_USER: ai_pool_user
      POSTGRES_PASSWORD: ai_pool_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_pool_user -d ai_pool"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-pool-net

  pool-generator:
    build:
      context: ./services/pool-generator
      dockerfile: Dockerfile
    container_name: ai-pool-generator
    environment:
      CELERY_BROKER_URL: amqp://admin:admin@rabbitmq:5672//
      REDIS_URL: redis://redis:6379/0
      LLM_API_URL: ${LLM_API_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      POOL_TARGET_SIZE: ${POOL_TARGET_SIZE:-50}
      POOL_MIN_SIZE: ${POOL_MIN_SIZE:-10}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-pool-net

  challenge-engine:
    build:
      context: ./services/challenge-engine
      dockerfile: Dockerfile
    container_name: ai-pool-engine
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      REDIS_KEY: challenge_pool
      DATABASE_URL: postgresql+asyncpg://ai_pool_user:ai_pool_pass@postgres:5432/ai_pool
      POOL_MIN_SIZE: ${POOL_MIN_SIZE:-10}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-pool-net

volumes:
  rabbitmq_data:
  redis_data:
  postgres_data:

networks:
  ai-pool-net:
    driver: bridge
